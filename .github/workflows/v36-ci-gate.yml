name: v36 Outcome Attribution & Hybrid ROI CI Gate

on:
  push:
    branches: [feature/governance-v36-outcome-attribution-roi-loop]
  pull_request:
    branches: [main]
    paths:
      - '09-tools/**'
      - '.github/workflows/v36-ci-gate.yml'

env:
  PYTHONPATH: 09-tools

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r 09-tools/requirements.txt
          pip install pytest pytest-asyncio httpx sqlalchemy pydantic-settings fastapi
      
      - name: Run outcome attribution core tests
        run: |
          pytest 09-tools/tests/test_vm_webapp_outcome_attribution.py -v
        env:
          PYTHONPATH: 09-tools
      
      - name: Run hybrid ROI engine tests
        run: |
          pytest 09-tools/tests/test_vm_webapp_hybrid_roi_engine.py -v
        env:
          PYTHONPATH: 09-tools
      
      - name: Run API v2 tests
        run: |
          pytest 09-tools/tests/test_vm_webapp_api_v2_v36_additions.py -v
        env:
          PYTHONPATH: 09-tools
      
      - name: Run metrics tests
        run: |
          pytest 09-tools/tests/test_vm_webapp_metrics_v36_outcome_roi.py -v
        env:
          PYTHONPATH: 09-tools

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install lint tools
        run: pip install ruff black
      
      - name: Run ruff
        run: |
          ruff check 09-tools/vm_webapp/outcome_attribution.py \
                    09-tools/vm_webapp/hybrid_roi_engine.py \
                    09-tools/vm_webapp/api_outcome_roi.py
      
      - name: Run black check
        run: |
          black --check 09-tools/vm_webapp/outcome_attribution.py \
                      09-tools/vm_webapp/hybrid_roi_engine.py \
                      09-tools/vm_webapp/api_outcome_roi.py

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install mypy and stubs
        run: |
          pip install mypy types-PyYAML
      
      - name: Run type check on ROI modules
        run: |
          mypy 09-tools/vm_webapp/outcome_attribution.py --ignore-missing-imports
          mypy 09-tools/vm_webapp/hybrid_roi_engine.py --ignore-missing-imports

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 09-tools/web/vm-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: 09-tools/web/vm-ui
        run: npm ci
      
      - name: Run frontend tests
        working-directory: 09-tools/web/vm-ui
        run: npm test -- --run src/features/workspace/components/OutcomeRoiPanel.test.tsx

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 09-tools/web/vm-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: 09-tools/web/vm-ui
        run: npm ci
      
      - name: Build frontend
        working-directory: 09-tools/web/vm-ui
        run: npm run build

  metrics-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r 09-tools/requirements.txt
          pip install pytest sqlalchemy pydantic-settings fastapi prometheus_client httpx
      
      - name: Validate ROI metrics schema
        run: |
          pytest 09-tools/tests/test_vm_webapp_metrics_v36_outcome_roi.py::TestOutcomeAttributionMetrics::test_get_outcome_roi_metrics_returns_v36 -v
        env:
          PYTHONPATH: 09-tools

  yaml-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate workflow YAML
        run: |
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/v36-ci-gate.yml'))"
          echo "✓ YAML validation passed"

  changelog-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check CHANGELOG.md updated
        run: |
          if ! git diff --name-only HEAD~1 | grep -q "CHANGELOG.md"; then
            echo "⚠️ WARNING: CHANGELOG.md not updated in this PR"
          fi
