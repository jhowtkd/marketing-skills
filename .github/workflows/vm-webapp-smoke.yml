            uv run pytest 09-tools/tests/test_vm_webapp_recovery_chain.py -q && \
            uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -q && \
            uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -q
            echo $? > /tmp/backend.exit
          ) &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          echo "::endgroup::"

          echo "::group::[subgate: frontend] Running frontend tests"
          npm run test -- --run src/features/workspace/components/AdaptiveEscalationPanel.test.tsx
          FRONTEND_1_EXIT=$?
          npm run test -- --run src/features/workspace/components/PredictiveResiliencePanel.test.tsx
          FRONTEND_2_EXIT=$?
          npm run test -- --run src/features/workspace/components/RecoveryOrchestrationPanel.test.tsx
          FRONTEND_3_EXIT=$?
          echo "No safety autotuning UI tests available"
          FRONTEND_4_EXIT=0
          echo "::endgroup::"

          echo "::group::[parallel] Waiting for backend"
          wait $BACKEND_PID
          BACKEND_EXIT=$(cat /tmp/backend.exit)
          echo "Backend exit code: $BACKEND_EXIT"
          echo "::endgroup::"

          echo "::group::[subgate: resumo]"
          echo "Backend: $BACKEND_EXIT"
          echo "Frontend 1: $FRONTEND_1_EXIT"
          echo "Frontend 2: $FRONTEND_2_EXIT"
          echo "Frontend 3: $FRONTEND_3_EXIT"
          echo "Frontend 4: $FRONTEND_4_EXIT"
          echo "::endgroup::"

          if [ $BACKEND_EXIT -ne 0 ] || [ $FRONTEND_1_EXIT -ne 0 ] || [ $FRONTEND_2_EXIT -ne 0 ] || [ $FRONTEND_3_EXIT -ne 0 ] || [ $FRONTEND_4_EXIT -ne 0 ]; then
            echo "ERROR: One or more test groups failed"
            exit 1
          fi

      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

