  onboarding-gates-combined:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen

      # Frontend setup
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci

      # Parallel execution
      - name: "Run tests (parallel)"
        working-directory: ./09-tools/web/vm-ui
        run: |
          echo "::group::[parallel] Starting backend tests in background"
          (
            cd /home/runner/work/marketing-skills/marketing-skills
            uv run pytest 09-tools/tests/test_onboarding_api.py -q && \
            uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -k "onboarding" -q || echo "No onboarding tests in api_v2" && \
            uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -k "onboarding" -q || echo "No onboarding tests in prometheus" && \
            uv run pytest 09-tools/tests/test_vm_webapp_activation_learning.py -q || echo "Activation learning tests" && \
            uv run pytest 09-tools/tests/test_vm_webapp_onboarding_experiments.py -q || echo "Onboarding experiments tests" && \
            uv run pytest 09-tools/tests/test_vm_webapp_onboarding_experiment_policy.py -q || echo "Onboarding experiment policy tests"
            echo $? > /tmp/backend.exit
          ) &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          echo "::endgroup::"

          echo "::group::[subgate: frontend] Running frontend tests"
          npm run test -- --run src/features/onboarding/telemetry.test.ts
          FRONTEND_1_EXIT=$?
          npm run test -- --run src/features/onboarding/funnel.v31.test.ts
          FRONTEND_2_EXIT=$?
          npm run test -- --run src/features/onboarding/OnboardingWizard.test.tsx
          FRONTEND_3_EXIT=$?
          npm run test -- --run src/features/onboarding/TemplatePicker.test.tsx
          FRONTEND_4_EXIT=$?
          npm run test -- --run src/features/onboarding/ContextualTour.test.tsx
          FRONTEND_5_EXIT=$?
          npm run test -- --run src/features/workspace/components/OnboardingActivationPanel.test.tsx || echo "OnboardingActivationPanel test"
          FRONTEND_6_EXIT=$?
          npm run test -- --run src/features/workspace/components/OnboardingExperimentPanel.test.tsx || echo "OnboardingExperimentPanel test"
          FRONTEND_7_EXIT=$?
          echo "::endgroup::"

          echo "::group::[parallel] Waiting for backend"
          wait $BACKEND_PID
          BACKEND_EXIT=$(cat /tmp/backend.exit)
          echo "Backend exit code: $BACKEND_EXIT"
          echo "::endgroup::"

          echo "::group::[subgate: resumo]"
          echo "Backend: $BACKEND_EXIT"
          echo "Frontend 1: $FRONTEND_1_EXIT"
          echo "Frontend 2: $FRONTEND_2_EXIT"
          echo "Frontend 3: $FRONTEND_3_EXIT"
          echo "Frontend 4: $FRONTEND_4_EXIT"
          echo "Frontend 5: $FRONTEND_5_EXIT"
          echo "Frontend 6: $FRONTEND_6_EXIT"
          echo "Frontend 7: $FRONTEND_7_EXIT"
          echo "::endgroup::"

          if [ $BACKEND_EXIT -ne 0 ] || [ $FRONTEND_1_EXIT -ne 0 ] || [ $FRONTEND_2_EXIT -ne 0 ] || [ $FRONTEND_3_EXIT -ne 0 ] || [ $FRONTEND_4_EXIT -ne 0 ] || [ $FRONTEND_5_EXIT -ne 0 ] || [ $FRONTEND_6_EXIT -ne 0 ] || [ $FRONTEND_7_EXIT -ne 0 ]; then
            echo "ERROR: One or more test groups failed"
            exit 1
          fi

      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build
