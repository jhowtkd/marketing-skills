        run: |
          npm run test -- --run src/features/workspace/WorkspaceRunBinding.test.tsx src/features/workspace/useWorkspace.editorialDecision.test.tsx src/features/workspace/WorkspaceGoldenDecisionFlow.test.tsx src/features/workspace/EditorialAuditPanel.test.tsx src/features/workspace/useWorkspace.firstRunRecommendation.test.tsx src/features/workspace/components/AgentDagOpsPanel.test.tsx

      - name: "[subgate: ux-task-first-redesign-gate-v29] Test v29 UX task-first redesign"
        working-directory: ./09-tools/web/vm-ui
        run: |
          # UX telemetry and funnel
          npm run test -- --run src/features/ux/telemetry.test.ts
          npm run test -- --run src/features/ux/funnel.test.ts
          # Task Rail navigation
          npm run test -- --run src/features/workspace/components/TaskRail.test.tsx
          # Next Best Action
          npm run test -- --run src/features/workspace/components/NextBestActionCard.test.tsx
          # Inbox task-first
          npm run test -- --run src/features/inbox/InboxPanel.taskFirst.test.tsx
          # Timeline semantic
          npm run test -- --run src/features/workspace/TimelineSemantic.test.tsx
          # Settings with impact previews
          npm run test -- --run src/features/settings/SettingsPage.taskFirst.test.tsx
          # Full workspace test suite
          npm run test -- --run src/features/workspace/

      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

      - name: "[subgate: frontend-gate] Upload build artifact"
        uses: actions/upload-artifact@v4
        with:
          name: vm-ui-dist-smoke
          path: 09-tools/web/vm-ui/dist
