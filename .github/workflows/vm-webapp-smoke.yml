        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_copilot_segments.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_copilot_segments_adjustment.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2_copilot_segments.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus_copilot_v14.py -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
