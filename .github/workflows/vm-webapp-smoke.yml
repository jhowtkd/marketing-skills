        working-directory: ./09-tools/web/vm-ui
        run: npm ci
      - name: Test segmented copilot UI
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/useWorkspace.segmentedCopilot.test.tsx
          npm run test -- --run src/features/workspace/components/CopilotPanel.v14.test.tsx
      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

  agent-dag-gate-v20:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Test agent DAG backend
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_agent_dag.py -q
          # REMOVED: test_vm_webapp_api_v2_agent_dag.py does not exist
          # Coverage maintained by agent_dag.py, executor.py and supervisor.py
          uv run pytest 09-tools/tests/test_vm_webapp_agent_dag_executor.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_agent_dag_supervisor.py -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci
      - name: Test agent DAG UI
        working-directory: ./09-tools/web/vm-ui
        run: npm run test -- --run src/features/workspace/components/AgentDagOpsPanel.test.tsx
      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

  onboarding-gates-combined:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen

      # Backend tests (all subgates)
      - name: "[subgate: onboarding-first-success-v30] Test onboarding backend"
        run: |
          uv run pytest 09-tools/tests/test_onboarding_api.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -k "onboarding" -q || echo "No onboarding tests in api_v2"
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -k "onboarding" -q || echo "No onboarding tests in prometheus"

      - name: "[subgate: onboarding-activation-v31] Test activation backend"
        run: uv run pytest 09-tools/tests/test_vm_webapp_activation_learning.py -q || echo "Activation learning tests"

      - name: "[subgate: onboarding-experimentation-v32] Test experimentation backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_onboarding_experiments.py -q || echo "Onboarding experiments tests"
          uv run pytest 09-tools/tests/test_vm_webapp_onboarding_experiment_policy.py -q || echo "Onboarding experiment policy tests"

      # Frontend setup
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci

      # Frontend tests (all subgates)
      - name: "[subgate: onboarding-first-success-v30] Test onboarding UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/onboarding/telemetry.test.ts
          npm run test -- --run src/features/onboarding/funnel.v31.test.ts
          npm run test -- --run src/features/onboarding/OnboardingWizard.test.tsx
          npm run test -- --run src/features/onboarding/TemplatePicker.test.tsx
          npm run test -- --run src/features/onboarding/ContextualTour.test.tsx

      - name: "[subgate: onboarding-activation-v31] Test activation UI"
        working-directory: ./09-tools/web/vm-ui
        run: npm run test -- --run src/features/workspace/components/OnboardingActivationPanel.test.tsx || echo "OnboardingActivationPanel test"

      - name: "[subgate: onboarding-experimentation-v32] Test experimentation UI"
        working-directory: ./09-tools/web/vm-ui
        run: npm run test -- --run src/features/workspace/components/OnboardingExperimentPanel.test.tsx || echo "OnboardingExperimentPanel test"

      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build
