      - run: uv sync --frozen
      - name: Test UX telemetry and metrics backend
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci
      - name: Test v29 UX task-first redesign
        working-directory: ./09-tools/web/vm-ui
        run: |
          # UX telemetry and funnel
          npm run test -- --run src/features/ux/telemetry.test.ts
          npm run test -- --run src/features/ux/funnel.test.ts
          # Task Rail navigation
          npm run test -- --run src/features/workspace/components/TaskRail.test.tsx
          # Next Best Action
          npm run test -- --run src/features/workspace/components/NextBestActionCard.test.tsx
          # Inbox task-first
          npm run test -- --run src/features/inbox/InboxPanel.taskFirst.test.tsx
          # Timeline semantic
          npm run test -- --run src/features/workspace/TimelineSemantic.test.tsx
          # Settings with impact previews
          npm run test -- --run src/features/settings/SettingsPage.taskFirst.test.tsx
          # Full workspace test suite
          npm run test -- --run src/features/workspace/
      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

