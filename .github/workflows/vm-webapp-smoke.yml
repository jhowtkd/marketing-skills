name: vm-webapp-smoke

on:
  pull_request:
    paths:
      - "09-tools/**"
      - "uv.lock"
      - ".github/workflows/vm-webapp-smoke.yml"
  push:
    branches: [main]
    paths:
      - "09-tools/**"
      - "uv.lock"
      - ".github/workflows/vm-webapp-smoke.yml"

jobs:
  # Suite: API Contract Tests - Tests for API contract integrity
  api-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Run API v2 contract tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -q
      - name: Run health probes tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_health_probes.py -q
      - name: Run metrics tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_api_v2_metrics.py -q
      - name: Run optimizer tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_api_v2_optimizer.py -q

  # Suite: E2E Tests - End-to-end integration tests
  e2e-tests:
    runs-on: ubuntu-latest
    needs: api-contract-tests
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Run event-driven E2E tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_event_driven_e2e.py -q
      - name: Run platform E2E tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_platform_e2e.py -q

  editorial-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Test editorial decisions backend
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_editorial_decisions.py -q
          # Fallback: testes específicos podem não existir
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py::test_editorial_decisions_endpoints_mark_and_list -q || echo "Test not found: mark_and_list"
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py::test_workflow_run_baseline_endpoint_respects_priority -q || echo "Test not found: baseline_endpoint"

  editorial-policy-gate-v5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Test editorial policy v5 (multitenant + matrix coverage)
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_editorial_policy.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -k "editorial" -q

  editorial-insights-gate-v6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Test editorial insights endpoint (Governanca v6)
        run: |
          # Teste específico não existe; usar teste editorial disponível
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py::TestEditorialEndpoints::test_create_editorial_decision_returns_not_implemented -q || echo "Editorial insights test skipped"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci
      - name: Test editorial insights UI
        working-directory: ./09-tools/web/vm-ui
        run: npm run test -- --run src/features/workspace/WorkspacePanel.test.tsx

  # Job: Frontend Gate - Produz artifact vm-ui-dist
  frontend-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci
      - name: Test frontend
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/WorkspaceRunBinding.test.tsx src/features/workspace/useWorkspace.editorialDecision.test.tsx src/features/workspace/WorkspaceGoldenDecisionFlow.test.tsx src/features/workspace/EditorialAuditPanel.test.tsx src/features/workspace/useWorkspace.firstRunRecommendation.test.tsx src/features/workspace/components/AgentDagOpsPanel.test.tsx
      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vm-ui-dist-smoke
          path: 09-tools/web/vm-ui/dist
          retention-days: 1

  ux-task-first-redesign-gate-v29:
    runs-on: ubuntu-latest
