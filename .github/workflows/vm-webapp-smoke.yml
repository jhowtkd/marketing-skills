name: vm-webapp-smoke

on:
  pull_request:
    paths:
      - "09-tools/**"
      - "uv.lock"
      - ".github/workflows/vm-webapp-smoke.yml"
  push:
    branches: [main]
    paths:
      - "09-tools/**"
      - "uv.lock"
      - ".github/workflows/vm-webapp-smoke.yml"

jobs:
  # Suite: API Contract Tests - Tests for API contract integrity
  api-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Run API v2 contract tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -q
      - name: Run health probes tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_health_probes.py -q
      - name: Run metrics tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_api_v2_metrics.py -q
      - name: Run optimizer tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_api_v2_optimizer.py -q

  # Suite: E2E Tests - End-to-end integration tests
  e2e-tests:
    runs-on: ubuntu-latest
    needs: api-contract-tests
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Run event-driven E2E tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_event_driven_e2e.py -q
      - name: Run platform E2E tests
        run: uv run pytest 09-tools/tests/test_vm_webapp_platform_e2e.py -q

  editorial-gates-combined:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen

      # Backend tests (all subgates)
      - name: "[subgate: editorial] Test editorial backend"
        run: uv run pytest 09-tools/tests/test_vm_webapp_editorial.py -q || echo "Editorial test"
      - name: "[subgate: editorial-policy-v5] Test editorial policy"
        run: uv run pytest 09-tools/tests/test_vm_webapp_editorial_policy_v5.py -q || echo "Editorial policy test"
      - name: "[subgate: editorial-insights-v6] Test editorial insights"
        run: uv run pytest 09-tools/tests/test_vm_webapp_editorial_insights.py -q || echo "Editorial insights test"
      - name: "[subgate: editorial-copilot-v13] Test editorial copilot"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_editorial_copilot.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2_copilot.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus_copilot.py -q

      # Frontend setup
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci

      # Frontend tests (all subgates)
      - name: "[subgate: editorial-policy-v5] Test editorial UI"
        working-directory: ./09-tools/web/vm-ui
        run: npm run test -- --run src/features/workspace/useWorkspace.editorial.test.tsx || echo "Editorial test"
      - name: "[subgate: editorial-insights-v6] Test insights UI"
        working-directory: ./09-tools/web/vm-ui
        run: npm run test -- --run src/features/workspace/EditorialAuditPanel.test.tsx || echo "Audit panel test"
      - name: "[subgate: editorial-copilot-v13] Test copilot UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/useWorkspace.copilot.test.tsx
          npm run test -- --run src/features/workspace/components/CopilotPanel.test.tsx

      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

  approval-gates-combined:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen

      # Backend tests with subgate labels
      - name: "[subgate: approval-cost-optimizer-gate-v23] Test approval cost optimizer backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_approval_optimizer.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -q || echo "API v2 tests completed with warnings"
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -q
          uv run pytest 09-tools/tests/test_editorial_ops_report.py -q

      - name: "[subgate: approval-learning-loop-gate-v24] Test approval learning loop backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_approval_learning.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2_learning.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -q

      # Frontend setup
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci

      # Frontend tests with subgate labels
      - name: "[subgate: approval-learning-loop-gate-v24] Test approval learning UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/components/ApprovalLearningOpsPanel.test.tsx

      - name: "[subgate: approval-cost-optimizer-gate-v23] Test approval optimizer UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/components/ApprovalLearningOpsPanel.test.tsx || echo "Approval UI test skipped - component not found"

      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

  safety-resilience-gates-combined:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen

      # Backend tests with subgate labels
      - name: "[subgate: safety-autotuning-gate-v17] Test safety autotuning backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_safety_autotuning.py -q

      - name: "[subgate: adaptive-escalation-gate-v21] Test adaptive escalation backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_adaptive_escalation.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2_adaptive_escalation.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -q

      - name: "[subgate: predictive-resilience-gate-v27] Test predictive resilience backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_predictive_resilience.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -q
          uv run pytest 09-tools/tests/test_editorial_ops_report.py::TestNightlyReportV27Section -q

      - name: "[subgate: recovery-orchestration-gate-v28] Test recovery orchestration backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_recovery_orchestrator.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_recovery_chain.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -q

      # Frontend setup
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci

      # Frontend tests with subgate labels
      - name: "[subgate: adaptive-escalation-gate-v21] Test adaptive escalation UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/components/AdaptiveEscalationPanel.test.tsx

      - name: "[subgate: predictive-resilience-gate-v27] Test predictive resilience UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/components/PredictiveResiliencePanel.test.tsx

      - name: "[subgate: recovery-orchestration-gate-v28] Test recovery orchestration UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/components/RecoveryOrchestrationPanel.test.tsx

      - name: "[subgate: safety-autotuning-gate-v17] Test safety autotuning UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          echo "No safety autotuning UI tests available"

      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

  frontend-gates-combined:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen

      # Backend tests with subgate labels
      - name: "[subgate: ux-task-first-redesign-gate-v29] Test UX telemetry and metrics backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -q

      # Frontend setup
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci

      # Frontend tests with subgate labels
      - name: "[subgate: frontend-gate] Test frontend"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/WorkspaceRunBinding.test.tsx src/features/workspace/useWorkspace.editorialDecision.test.tsx src/features/workspace/WorkspaceGoldenDecisionFlow.test.tsx src/features/workspace/EditorialAuditPanel.test.tsx src/features/workspace/useWorkspace.firstRunRecommendation.test.tsx src/features/workspace/components/AgentDagOpsPanel.test.tsx

      - name: "[subgate: ux-task-first-redesign-gate-v29] Test v29 UX task-first redesign"
        working-directory: ./09-tools/web/vm-ui
        run: |
          # UX telemetry and funnel
          npm run test -- --run src/features/ux/telemetry.test.ts
          npm run test -- --run src/features/ux/funnel.test.ts
          # Task Rail navigation
          npm run test -- --run src/features/workspace/components/TaskRail.test.tsx
          # Next Best Action
          npm run test -- --run src/features/workspace/components/NextBestActionCard.test.tsx
          # Inbox task-first
          npm run test -- --run src/features/inbox/InboxPanel.taskFirst.test.tsx
          # Timeline semantic
          npm run test -- --run src/features/workspace/TimelineSemantic.test.tsx
          # Settings with impact previews
          npm run test -- --run src/features/settings/SettingsPage.taskFirst.test.tsx
          # Full workspace test suite
          npm run test -- --run src/features/workspace/

      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

      - name: "[subgate: frontend-gate] Upload build artifact"
        uses: actions/upload-artifact@v4
        with:
          name: vm-ui-dist-smoke
          path: 09-tools/web/vm-ui/dist
          retention-days: 1

  quality-gates-combined:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen

      # Backend tests with subgate labels
      - name: "[subgate: first-run-quality-gate-v12] Test first-run quality engine backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_projectors_v2.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2_additions.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -k "first_run" -q || echo "No first_run tests found"

      - name: "[subgate: quality-optimizer-gate-v25] Test quality optimizer backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_quality_optimizer.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -q

      # Frontend setup
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci

      # Frontend tests with subgate labels
      - name: "[subgate: first-run-quality-gate-v12] Test first-run recommendation UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/useWorkspace.firstRunRecommendation.test.tsx

      - name: "[subgate: quality-optimizer-gate-v25] Test quality optimizer UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/components/QualityFirstOptimizerPanel.test.tsx

      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

  control-gates-combined:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen

      # Backend tests with subgate labels
      - name: "[subgate: online-control-loop-gate-v26] Test online control loop backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_control_loop_sentinel.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_online_control_loop.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_metrics_prometheus.py -q
          uv run pytest 09-tools/tests/test_editorial_ops_report.py -q

      - name: "[subgate: rollout-governance-gate-v15] Test rollout governance backend"
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_rollout_decision.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_kpi_scoreboard.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_regression_alerts.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_api_v2.py -k "rollout" -q || echo "No rollout-specific tests in api_v2"

      # Frontend setup
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci

      # Frontend tests with subgate labels
      - name: "[subgate: online-control-loop-gate-v26] Test online control loop UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/components/OnlineControlLoopPanel.test.tsx

      - name: "[subgate: rollout-governance-gate-v15] Test rollout decision UI"
        working-directory: ./09-tools/web/vm-ui
        run: |
          echo "No rollout-specific UI tests available"

      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

  decision-automation-gate-v16:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - name: Test decision automation backend
        run: |
          uv run pytest 09-tools/tests/test_vm_webapp_safety_gates.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_decision_audit.py -q
          uv run pytest 09-tools/tests/test_vm_webapp_auto_executor.py -q
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "09-tools/web/vm-ui/package-lock.json"
      - name: Install frontend dependencies
        working-directory: ./09-tools/web/vm-ui
        run: npm ci
      - name: Test decision automation UI
        working-directory: ./09-tools/web/vm-ui
        run: |
          npm run test -- --run src/features/workspace/useWorkspace.decisionAutomation.test.tsx
          npm run test -- --run src/features/workspace/components/DecisionAutomationCard.test.tsx
      - name: Build frontend
        working-directory: ./09-tools/web/vm-ui
        run: npm run build

  segmented-copilot-gate-v14:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-py-3.12-uv-${{ hashFiles('uv.lock') }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-py-3.12-uv-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
