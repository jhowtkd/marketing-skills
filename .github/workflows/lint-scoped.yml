name: Lint Scoped

on:
  pull_request:
    branches: [main]
    paths:
      - '09-tools/vm_webapp/**'
      - '09-tools/web/vm-ui/src/**'
      - '.github/workflows/lint-scoped.yml'

env:
  PYTHONPATH: 09-tools

jobs:
  # Lint only changed files to prevent new debt while not blocking on legacy issues
  lint-changed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to get changed files
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Python lint tools
        run: |
          pip install ruff black mypy
      
      - name: Get changed Python files
        id: changed-py
        run: |
          # Get changed Python files compared to main
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- '09-tools/vm_webapp/**/*.py' || true)
          echo "Changed Python files:"
          echo "$CHANGED_FILES"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Lint changed Python files with ruff
        if: steps.changed-py.outputs.files != ''
        run: |
          echo "Linting changed files..."
          echo "${{ steps.changed-py.outputs.files }}" | xargs -r ruff check --select E,W,F,I --ignore E501,W293 || true
        continue-on-error: true
      
      - name: Type check changed Python files with mypy
        if: steps.changed-py.outputs.files != ''
        run: |
          echo "Type checking changed files..."
          pip install -r 09-tools/requirements.txt --quiet
          echo "${{ steps.changed-py.outputs.files }}" | xargs -r mypy --ignore-missing-imports
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 09-tools/web/vm-ui/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: 09-tools/web/vm-ui
        run: npm ci
      
      - name: Get changed TypeScript files
        id: changed-ts
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- '09-tools/web/vm-ui/src/**/*.{ts,tsx}' || true)
          echo "Changed TypeScript files:"
          echo "$CHANGED_FILES"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Lint changed TypeScript files
        if: steps.changed-ts.outputs.files != ''
        working-directory: 09-tools/web/vm-ui
        run: |
          echo "Linting changed TypeScript files..."
          echo "${{ steps.changed-ts.outputs.files }}" | xargs -r npx eslint --max-warnings 0
      
      - name: Report status
        if: always()
        run: |
          echo "### Lint Scoped Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Ruff | ${{ steps.changed-py.outputs.files != '' && 'Checked' || 'No files changed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Mypy | ${{ steps.changed-py.outputs.files != '' && 'Checked' || 'No files changed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript ESLint | ${{ steps.changed-ts.outputs.files != '' && 'Checked' || 'No files changed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Note: Only files changed in this PR are linted. Legacy debt is tracked in docs/releases/2026-03-03-vm-studio-v2-1-2-ci-hardening.md" >> $GITHUB_STEP_SUMMARY
